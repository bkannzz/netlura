<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/alura.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Netlura</title>
</head>

<body>
    <header>
        <button id="theme-toggle" aria-label="Alternar tema">Alternar Tema
        </button>
        <h1>Quem está assistindo?</h1>
    </header>
    <main>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles" aria-label="Seletor de perfil">
                <ul>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile" 
                        aria-label="Selecionar Bulbasaur">
                            <figure>
                                <img src="assets/perfil-1.png" alt="Perfil do 
                                Bulbasaur" width="150" height="150" 
                                loading="lazy">
                                <figcaption>Bulbasaur</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="assets/perfil-2.png" alt="Perfil 2" 
                                width="150" height="150" loading="lazy">
                                <figcaption>Squirtle</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="assets/perfil-3.png" alt="Perfil 3" 
                                width="150" height="150" loading="lazy">
                                <figcaption>Charmander</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
    </main>
    <script src="js/index.js" defer></script>
</body>

</html>
